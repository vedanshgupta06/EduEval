spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/edueval
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  web:
    resources:
      static-locations: file:./uploads/
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8080

app:
  jwt:
    secret: edueval-super-secret-key-change-this-in-production-minimum-256-bits
    expiration-ms: 86400000

  ai-engine:
    base-url: http://localhost:8000

  file-storage:
    upload-dir: ./uploads

logging:
  level:
    com.edueval: DEBUG
    org.springframework.security: DEBUG



