spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: ${EDUEVAL_DB_URL:jdbc:postgresql://localhost:5432/edueval}
    username: ${EDUEVAL_DB_USERNAME:postgres}
    password: ${EDUEVAL_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  web:
    resources:
      static-locations: file:${EDUEVAL_UPLOAD_DIR:./uploads}/
  jpa:
    hibernate:
      ddl-auto: ${EDUEVAL_JPA_DDL_AUTO:update}
    show-sql: ${EDUEVAL_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${EDUEVAL_FORMAT_SQL:false}

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${EDUEVAL_JWT_SECRET}
    expiration-ms: ${EDUEVAL_JWT_EXPIRATION_MS:86400000}

  ai-engine:
    base-url: ${EDUEVAL_AI_BASE_URL:http://127.0.0.1:8000}

  file-storage:
    upload-dir: ${EDUEVAL_UPLOAD_DIR:./uploads}

logging:
  level:
    com.edueval: ${EDUEVAL_LOG_LEVEL:INFO}
    org.springframework.security: ${EDUEVAL_SECURITY_LOG_LEVEL:WARN}



