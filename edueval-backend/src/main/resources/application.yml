spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url:  ${DB_URL}
    username:  ${DB_username}
    password:  ${DB_password}
    driver-class-name: org.postgresql.Driver
 
  jpa:
    hibernate:
      ddl-auto: ${EDUEVAL_JPA_DDL_AUTO:update}
    show-sql: ${EDUEVAL_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${EDUEVAL_FORMAT_SQL:false}

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${EDUEVAL_JWT_SECRET}
    expiration-ms: ${EDUEVAL_JWT_EXPIRATION_MS:86400000}

  ai-engine:
    base-url: ${EDUEVAL_AI_BASE_URL:http://127.0.0.1:8000}


logging:
  level:
    com.edueval: ${EDUEVAL_LOG_LEVEL:INFO}
    org.springframework.security: ${EDUEVAL_SECURITY_LOG_LEVEL:WARN}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}    